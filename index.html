<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Premium Practice Mock</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#f4f7f6}
.topbar{background:linear-gradient(135deg, #00bfff, #008ccc);color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;font-weight:bold;box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
.timer-box{background:#fff;color:#e53935;padding:5px 12px;border-radius:20px; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
.button-row{display:flex;justify-content:space-around;padding:12px; background: white; border-bottom: 1px solid #ddd;}
.action-btn{background:#00bfff;color:white;border:none;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:bold; cursor: pointer; transition: 0.3s;}
.action-btn:active { transform: scale(0.95); }
.submit-btn { background: #4CAF50; }
.qheader{display:flex;justify-content:space-between;padding:15px;font-weight:bold; color: #333;}
.last{color:#e53935; background: #ffebee; padding: 4px 8px; border-radius: 5px; font-size: 12px;}
.qcard{background:white;margin:10px 15px;border-radius:12px;overflow:hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid #00bfff;}
.qtitle{padding:18px;background:#fafafa;font-size:17px; color: #333; font-weight: bold; border-bottom: 1px solid #eee;}
.option{display:flex;align-items:center;padding:15px;background:white;border-bottom:1px solid #f1f1f1;cursor:pointer; transition: 0.2s;}
.option:last-child { border-bottom: none; }
.circle{width:20px;height:20px;border:2px solid #00bfff;border-radius:50%;margin-right:15px; transition: 0.2s;}
.option.selected { background: #e0faff; font-weight: bold; }
.option.selected .circle{background:#00bfff; border: 4px solid white; box-shadow: 0 0 0 2px #00bfff;}
.palette{position:fixed;right:-100%;top:0;width:75%;max-width: 300px;height:100%;background:white;overflow:auto;transition:0.3s;box-shadow:-5px 0 15px rgba(0,0,0,0.1);padding:20px; z-index: 1000;}
.palette h3 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
.palette.active{right:0}
.palette button{width:45px;height:45px;margin:6px;border:none;border-radius:8px; font-weight: bold; font-size: 16px; cursor: pointer;}
.notvisited{background:#e0e0e0; color: #55;}
.answered{background:#4CAF50;color:white; box-shadow: 0 2px 5px rgba(76, 175, 80, 0.4);}
.notanswered{background:#e53935;color:white; box-shadow: 0 2px 5px rgba(229, 57, 53, 0.4);}
.review{background:#ff9800;color:white; box-shadow: 0 2px 5px rgba(255, 152, 0, 0.4);}
.result{display:none;padding:15px}
.result-card{background:white;padding:20px;border-radius:12px;margin-bottom:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; font-size: 16px;}
.result-card b { font-size: 20px; color: #008ccc;}
.analysis-box{background:white;padding:15px;margin-bottom:12px;border-radius:8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);}
.analysis-box.correct-box{border-left:5px solid #4CAF50;}
.analysis-box.wrong-box{border-left:5px solid #e53935;}
.analysis-box.unattempted-box{border-left:5px solid #ff9800;}
.correct{color:#4CAF50;font-weight:bold}
.wrong{color:#e53935;font-weight:bold}
.float-btn{position:fixed;bottom:25px;right:25px;width:60px;height:60px;background:#00bfff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:28px; box-shadow: 0 4px 15px rgba(0, 191, 255, 0.4); z-index: 999; cursor: pointer;}
.close-palette { position: absolute; right: 20px; top: 20px; background: red; color: white; border: none; border-radius: 5px; padding: 5px 10px; font-weight: bold; cursor: pointer;}
.custom-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
.custom-modal-box { background: white; padding: 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.custom-modal-box h3 { margin-top: 0; color: #4CAF50; font-size: 22px; margin-bottom: 10px; }
.custom-modal-box p { color: #555; margin-bottom: 20px; font-size: 15px; }
.custom-modal-btns { display: flex; justify-content: space-around; gap: 15px; }
.btn-cancel { background: #e0e0e0; color: #333; padding: 12px; border: none; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
.btn-submit { background: #4CAF50; color: white; padding: 12px; border: none; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
.motivation-banner { background: #e8f5e9; border: 2px solid #4CAF50; color: #2e7d32; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; text-align: center; font-size: 18px;}

/* 📢 Channel Promo Banner */
.promo-banner { background: linear-gradient(135deg, #673ab7, #512da8); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 25px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(103,58,183,0.4); }
.promo-banner h3 { margin-top: 0; font-size: 20px; }
.promo-banner p { font-size: 14px; margin-bottom: 15px; color: #e1bee7;}
.promo-btn { display: inline-block; background: #ff9800; color: white; text-decoration: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(255,152,0,0.4); transition: 0.3s;}
.promo-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div class="topbar">
<span onclick="togglePalette()" style="cursor:pointer;" id="top-title">☰ Practice Mock</span>
<div class="timer-box" id="timer">00:00</div>
</div>

<div class="button-row" id="top-btn-row">
<button class="action-btn" onclick="previousQuestion()">Back</button>
<button class="action-btn" style="background:#ff9800;" onclick="markReview()">Review</button>
<button class="action-btn" onclick="saveNext()">Save & Next</button>
<button class="action-btn submit-btn" onclick="showSubmitConfirm()">Submit</button>
</div>

<div class="qheader" id="question-header">
<div>Question : <span id="qno">1</span> / <span id="totalq">0</span></div>
<div class="last" id="lastMin">--</div>
</div>

<div id="exam"><h3 style="text-align:center; padding:20px;">⏳ टेस्ट लोड हो रहा है...</h3></div>

<div class="palette" id="palette">
    <button class="close-palette" onclick="togglePalette()">X</button>
    <h3>Questions Palette</h3>
    <div id="palette-buttons"></div>
</div>

<div id="submit-confirm-modal" class="custom-modal-overlay">
    <div class="custom-modal-box">
        <h3>Submit Test?</h3>
        <p>क्या आप सच में टेस्ट सबमिट करना चाहते हैं?</p>
        <div class="custom-modal-btns">
            <button class="btn-cancel" onclick="hideSubmitConfirm()">रद्द करें</button>
            <button class="btn-submit" onclick="executeSubmit()">हाँ, सबमिट करें</button>
        </div>
    </div>
</div>

<div class="result" id="result"></div>
<div class="float-btn" id="menu-float-btn" onclick="togglePalette()">≡</div>

<script>
let questions = []; 
let current = 0; 
let answers = []; 
let status = []; 
let submitted = false;
let time = 0; 
let timerInterval;
let isReviewMode = false;

let positiveMark = 2.0;
let negativeMark = 0.25;
let testCutoff = 35.0;

const API_BASE_URL = "https://mock-bot-l091.onrender.com"; 

window.onload = async function() {
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
    }

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('test_id');
    const savedAnswers = urlParams.get('answers');

    if(testId) {
        try {
            let response = await fetch(`${API_BASE_URL}/get_test/${testId}`);
            if(!response.ok) throw new Error("Test not found");
            let testData = await response.json();
            
            questions = testData.questions;
            positiveMark = testData.positive_mark || 2.0;
            negativeMark = testData.negative_mark || 0.25;
            testCutoff = testData.cutoff || 35.0;
            time = (testData.time_limit || 15) * 60;
            
            document.getElementById("totalq").innerText = questions.length;
            answers = new Array(questions.length).fill(null);
            status = new Array(questions.length).fill("notvisited");

            if(savedAnswers) {
                isReviewMode = true;
                submitted = true;
                answers = JSON.parse(savedAnswers);
                document.getElementById("top-title").innerText = "📊 Test Analysis";
                executeSubmit(true);
            } else {
                startTimer();
                loadQuestion();
            }
        } catch (error) {
            document.getElementById("exam").innerHTML = "<h3 style='text-align:center;color:red;padding:20px;'>⚠️ टेस्ट लोड करने में त्रुटि। कृपया सुनिश्चित करें कि यह टेस्ट डिलीट नहीं हुआ है।</h3>";
        }
    } else {
        document.getElementById("exam").innerHTML = "<h3 style='text-align:center;padding:20px;'>⚠️ अमान्य टेस्ट लिंक!</h3>";
    }
};

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        let m=Math.floor(time/60); let s=time%60;
        document.getElementById("timer").innerText=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
        document.getElementById("lastMin").innerText="Last "+(m<10?"0"+m:m)+" Mins";
        time--;
        if(time<0){ executeSubmit(); }
    }, 1000);
}

function loadQuestion(){
    if (questions.length === 0) return;
    let q = questions[current]; 
    let html = "<div class='qcard'><div class='qtitle'>Q"+(current+1)+". "+q.question+"</div>";
    
    if(q.img && q.img !== "") {
        html += "<div style='text-align:center; padding:10px;'><img src='"+q.img+"' style='max-width:100%; border-radius:8px; border: 1px solid #ddd;'></div>";
    }

    q.options.forEach((opt,i)=>{ 
        let isSelected = answers[current] === i ? "selected" : ""; 
        html+="<div class='option "+isSelected+"' onclick='selectOption(this,"+i+")'><div class='circle'></div>"+opt+"</div>"; 
    });
    html+="</div>"; 
    document.getElementById("exam").innerHTML=html; 
    document.getElementById("qno").innerText=current+1; 
    updatePalette();
}

function selectOption(el,i){
    if(submitted)return; 
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
    el.classList.add('selected'); answers[current]=i; status[current]="answered"; updatePalette();
}

function saveNext(){ if(answers[current]==null && status[current]!=="review"){ status[current]="notanswered"; } if(current<questions.length-1){current++;loadQuestion();} }
function previousQuestion(){ if(current>0){current--;loadQuestion();} }
function markReview(){ status[current]="review"; saveNext(); }
function togglePalette(){ document.getElementById("palette").classList.toggle("active"); }

function updatePalette(){
    let p=""; questions.forEach((q,i)=>{ p+="<button class='"+status[i]+"' onclick='goQ("+i+")'>"+(i+1)+"</button>"; });
    document.getElementById("palette-buttons").innerHTML=p;
}

function goQ(i){current=i;loadQuestion();togglePalette();}
function showSubmitConfirm() { if(submitted) return; document.getElementById("submit-confirm-modal").style.display = "flex"; }
function hideSubmitConfirm() { document.getElementById("submit-confirm-modal").style.display = "none"; }

function executeSubmit(isFromHistory = false){
    hideSubmitConfirm();
    submitted = true; 
    clearInterval(timerInterval);

    let correct=0,incorrect=0,unattempted=0;
    questions.forEach((q,i)=>{ 
        let correctIndex = q.options.indexOf(q.answer);
        if(answers[i]==null) unattempted++; 
        else if(answers[i] === correctIndex) correct++; 
        else incorrect++; 
    });
    
    let score = (correct * positiveMark) - (incorrect * negativeMark); 
    let maxScore = questions.length * positiveMark; 
    let accuracy = ((correct/(correct+incorrect||1))*100).toFixed(2);

    if(!isReviewMode) {
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const name = urlParams.get('name');
        const testId = urlParams.get('test_id');
        const testName = document.querySelector('.qtitle') ? "Mock Test" : "Test";
        
        if(uid && name) {
            fetch(`${API_BASE_URL}/submit_score`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: parseInt(uid),
                    first_name: name,
                    test_id: testId,
                    test_name: testName,
                    score: parseFloat(score),
                    accuracy: accuracy
                })
            }).catch(err => console.log(err));
        }
    }

    generateResultScreen(score, maxScore, correct, incorrect, unattempted, accuracy);
}

function generateResultScreen(score, maxScore, correct, incorrect, unattempted, accuracy) {
    document.getElementById("timer").style.display="none"; 
    document.getElementById("question-header").style.display="none";
    document.getElementById("top-btn-row").style.display="none"; 
    document.getElementById("menu-float-btn").style.display="none";
    document.getElementById("exam").style.display="none"; 
    document.getElementById("palette").style.display="none"; 
    document.getElementById("result").style.display="block";

    let html = "";
    
    // Motivation Banner
    if(score >= testCutoff) {
        html += "<div class='motivation-banner'>🎉 शाबाश! आपने कट-ऑफ ("+testCutoff+") पार कर ली है! 🇮🇳</div><br>";
    } else {
        html += "<div class='motivation-banner' style='background:#ffebee; border-color:#e53935; color:#c62828;'>⚠️ आपका स्कोर कट-ऑफ ("+testCutoff+") से कम है। और अभ्यास करें! 💪</div><br>";
    }

    // Result Card (यहाँ Skipped का रंग बदलकर #ff9800 कर दिया गया है)
    html += "<div class='result-card'><b>Your Score: "+score.toFixed(2)+" / "+maxScore+"</b><hr style='border:0;border-top:1px solid #eee;margin:15px 0;'><div style='display:flex; justify-content:space-around; text-align:center;'><div><span style='color:#4CAF50;font-size:24px;font-weight:bold;'>"+correct+"</span><br><small>Correct</small></div><div><span style='color:#e53935;font-size:24px;font-weight:bold;'>"+incorrect+"</span><br><small>Wrong</small></div><div><span style='color:#ff9800;font-size:24px;font-weight:bold;'>"+unattempted+"</span><br><small>Skipped</small></div></div><br><b>Accuracy: "+accuracy+"%</b></div><div style='max-width:300px; margin:0 auto;'><canvas id='chart'></canvas></div><h3 style='margin-top:30px; border-bottom:2px solid #ccc; padding-bottom:5px;'>Full Analysis</h3>";

    questions.forEach((q,i)=>{
        let userAns = answers[i]; 
        let correctIndex = q.options.indexOf(q.answer);
        let boxClass = "analysis-box"; 
        let statusText = "";

        // 1. Unattempted (Skipped) State - Orange Theme
        if(userAns == null){ 
            boxClass += " unattempted-box"; 
            statusText = "<span style='color:#e65100; font-weight:bold; background:#ffe0b2; padding:5px 10px; border-radius:6px; font-size:12px;'>⚠️ Skipped ( 0 )</span>"; 
        }
        // 2. Correct State - Green Theme
        else if(userAns === correctIndex){ 
            boxClass += " correct-box"; 
            statusText = "<span style='color:#1b5e20; font-weight:bold; background:#c8e6c9; padding:5px 10px; border-radius:6px; font-size:12px;'>✅ Correct ( +"+positiveMark+" )</span>"; 
        }
        // 3. Wrong State - Red Theme
        else{ 
            boxClass += " wrong-box"; 
            statusText = "<span style='color:#b71c1c; font-weight:bold; background:#ffcdd2; padding:5px 10px; border-radius:6px; font-size:12px;'>❌ Wrong ( -"+negativeMark+" )</span>"; 
        }

        html += "<div class='" + boxClass + "'>";
        
        // Question Text
        html += "<div style='display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px; font-size:16px;'><b>Q"+(i+1)+". "+q.question+"</b><div style='text-align:right; min-width:100px; margin-left:10px;'>"+statusText+"</div></div>";

        // Image if present
        if(q.img && q.img !== "") {
            html += "<div style='text-align:center; padding:10px;'><img src='"+q.img+"' style='max-width:100%; border-radius:8px; border: 1px solid #ddd;'></div>";
        }

        // Options Loop
        html += "<div style='margin-top: 10px;'>";
        q.options.forEach((opt, optIndex) => {
            let optStyle = "padding:12px; margin-bottom:8px; border-radius:8px; border:1px solid #eee; background:#fafafa; color:#333;";
            let icon = "⚪";

            if (optIndex === correctIndex) {
                optStyle = "padding:12px; margin-bottom:8px; border-radius:8px; border:2px solid #4CAF50; background:#e8f5e9; font-weight:bold; color:#2e7d32;";
                icon = "✅";
            } else if (optIndex === userAns && userAns !== correctIndex) {
                optStyle = "padding:12px; margin-bottom:8px; border-radius:8px; border:2px solid #e53935; background:#ffebee; font-weight:bold; color:#c62828;";
                icon = "❌";
            }

            html += "<div style='" + optStyle + "'>" + icon + " " + opt + "</div>";
        });
        html += "</div>";

        // ✨ Beautiful Explanation UI ✨
        html += "<hr style='border:0;border-top:1px dashed #ccc; margin: 20px 0 15px 0;'>";
        html += "<div style='background:#f4f9ff; padding:15px; border-radius:10px; border:1px solid #d0e3ff; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);'>";
        
        // Stylish Heading Badge
        html += "<div style='display:inline-block; background:linear-gradient(135deg, #00bfff, #007acc); color:white; padding:6px 14px; border-radius:6px; font-weight:bold; font-size:14px; margin-bottom:12px; box-shadow:0 3px 6px rgba(0,191,255,0.3);'>💡 Explanation (व्याख्या)</div>";
        
        // Explanation Content
        html += "<div style='white-space: pre-wrap; line-height: 1.6; font-size:14px; color:#444;'>"+(q.explanation ? q.explanation : "इस प्रश्न के लिए कोई व्याख्या उपलब्ध नहीं है।")+"</div>";
        html += "</div>";
        
        // Box क्लोज
        html += "</div>"; 
    });
    
    // 📢 Channel Promo Banner
    html += `
        <div class="promo-banner">
            <h3>🚀 और नए मॉक टेस्ट चाहिए?</h3>
            <p>हमारे आधिकारिक टेलीग्राम चैनल से जुड़ें और हर दिन नए टेस्ट, स्टडी मटेरियल और अपडेट्स पाएं!</p>
            <a href="https://t.me/+bmzuj2Y68nFmYTc9" class="promo-btn">📢 अभी चैनल ज्वाइन करें</a>
        </div>
    `;
    
    document.getElementById("result").innerHTML=html;
    
    // Chart में Unattempted का कलर भी Orange (#ff9800) कर दिया है
    new Chart(document.getElementById("chart"),{ type:"doughnut", data:{labels:["Correct","Incorrect","Skipped"], datasets:[{data:[correct,incorrect,unattempted], backgroundColor:["#4CAF50","#e53935","#ff9800"]}]} });
    window.scrollTo(0, 0);
}
</script>
</body>
</html>
